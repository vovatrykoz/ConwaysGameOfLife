name: .NET AOT Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-manual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-extra

      - name: Generate Manual.pdf
        run: |
          pandoc docs/Manual.md \
            -o Manual.pdf \
            --metadata title="Conway's Game of Life Manual" \
            --metadata version="${{ github.ref_name }}"

      - name: Upload Manual artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual
          path: Manual.pdf

  build-linux:
    runs-on: ubuntu-22.04
    needs: build-manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Manual
        uses: actions/download-artifact@v4
        with:
          name: manual
          path: ./

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Linux (AOT)
        run: >
            dotnet publish
            ./src/Conway.App/
            -c Release
            -r linux-x64
            -p:PublishAot=true
            --self-contained true
            -o ./linux-build/ConwaysGameOfLife

      - name: Archive Linux build
        run: |
          cd ./linux-build
          zip -r ../ConwaysGameOfLife-linux-x64.zip ./ConwaysGameOfLife
          cp ../Manual.pdf ./ConwaysGameOfLife
          cd ../

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ConwaysGameOfLife-linux-x64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Manual
        uses: actions/download-artifact@v4
        with:
          name: manual
          path: ./

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Windows (AOT)
        run: >
            dotnet publish
            ./src/Conway.App/
            -c Release
            -r win-x64
            -p:PublishAot=true
            --self-contained true
            -o ./windows-build/ConwaysGameOfLife

      - name: Archive Windows build
        run: |
            Set-Location ./windows-build
            powershell Compress-Archive -Path ./ConwaysGameOfLife -DestinationPath ../ConwaysGameOfLife-win-x64.zip
            Copy-Item ../Manual.pdf ./ConwaysGameOfLife
            Set-Location ../

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: ConwaysGameOfLife-win-x64.zip

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-manual, build-linux, build-windows]
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: ./

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ConwaysGameOfLife-linux-x64.zip
            ConwaysGameOfLife-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
